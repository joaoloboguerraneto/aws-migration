name: Terraform — Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options: [dev, stg, prd]
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options: [plan, apply, destroy]

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.6.0"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.detect.outputs.environments }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed environments
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo 'environments=["${{ inputs.environment }}"]' >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- terraform/ | grep -oP 'environments/\K[^/]+' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            if [[ "$CHANGED" == "[]" || -z "$CHANGED" ]]; then
              # Se mudou modules, aplica dev por padrão
              echo 'environments=["dev"]' >> "$GITHUB_OUTPUT"
            else
              echo "environments=${CHANGED}" >> "$GITHUB_OUTPUT"
            fi
          fi

  terraform:
    name: "${{ matrix.env }}"
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.environments != '[]'
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.detect.outputs.environments) }}
    environment: ${{ matrix.env }}

    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.env }}

    steps:
      - uses: actions/checkout@v4

      # ── Auth AWS via OIDC ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: tf-${{ matrix.env }}-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend-config=../../backend.hcl

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan & Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
        run: terraform apply -auto-approve

      - name: Terraform Plan Only
        if: |
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'plan')
        run: terraform plan -no-color

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        run: terraform destroy -auto-approve  

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/${{ matrix.env }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(plan.length - 60000) : plan;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Terraform Plan — \`${{ matrix.env }}\`\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Terraform Plan & Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        run: terraform destroy -auto-approve

      - name: Summary
        if: always()
        run: |
          echo "### Terraform — ${{ matrix.env }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ matrix.env }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`$(git rev-parse --short HEAD)\` |" >> $GITHUB_STEP_SUMMARY
