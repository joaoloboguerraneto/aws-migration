name: CI/CD - Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'charts/**'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        type: choice
        options: [dev, stg, prd]

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: aws-challenge
  ECR_REPOSITORY: aws-challenge/stopwatch-app

permissions:
  contents: read
  id-token: write

jobs:
  # ─── Build, Test, Scan, Push ───────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: app/go.mod

      - name: Test
        working-directory: app
        run: go test -v -race ./... 2>/dev/null || echo "No tests yet"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build metadata
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: app
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Push to ECR
        run: |
          docker push ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.meta.outputs.image }}:latest

      - name: Summary
        run: |
          echo "### Docker image pushed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ steps.meta.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ steps.meta.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY

  # ─── Deploy to EKS via Helm ────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.PROJECT_NAME }}-dev \
            --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        run: |
          helm upgrade --install stopwatch ./charts/app \
            --namespace stopwatch-dev \
            --create-namespace \
            --set image.repository=${{ needs.build.outputs.image }} \
            --set image.tag=${{ needs.build.outputs.tag }} \
            --set replicaCount=1 \
            --set resources.requests.cpu=50m \
            --set resources.requests.memory=32Mi \
            --set resources.limits.cpu=250m \
            --set resources.limits.memory=64Mi \
            --set autoscaling.enabled=false \
            --set ingress.enabled=true \
            --set serviceMonitor.enabled=false \
            --set networkPolicy.enabled=false \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          echo "### Deployment status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n stopwatch-dev >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n stopwatch-dev >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          kubectl get ingress -n stopwatch-dev >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY